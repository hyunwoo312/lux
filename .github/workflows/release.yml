name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if gh release view "v$version" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.check.outputs.version }}
      CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Package extension
        run: cd dist && zip -r "../lux-v${VERSION}.zip" . && cd ..
      - name: Generate release notes
        run: node --experimental-strip-types --disable-warning=ExperimentalWarning scripts/gen-changelog.ts --release-body "v${VERSION}" > release-notes.md
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${VERSION}" "lux-v${VERSION}.zip" --notes-file release-notes.md --target "${{ github.sha }}"
      - name: Upload to Chrome Web Store (draft)
        if: env.CWS_CLIENT_ID != ''
        uses: mnao305/chrome-extension-upload@v6.0.0
        with:
          file-path: lux-v${{ env.VERSION }}.zip
          extension-id: kmfabjnibncbooljgbkinkfddapmfcna
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          publish: false
